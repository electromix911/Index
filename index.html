<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti 🌙</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}
body{
    background:linear-gradient(180deg,#08142b,#162447,#1f4068);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Estrellas */
.estrella{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:brillar 2s infinite alternate;
}
@keyframes brillar{
    from{opacity:.2;}
    to{opacity:1;}
}

.caja{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding:30px;
    text-align:center;
    color:white;
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

h1{
    font-size:30px;
    margin-bottom:15px;
}

p{
    font-size:18px;
    margin-bottom:20px;
}

button{
    background:#ff4d88;
    color:white;
    border:none;
    padding:14px 35px;
    border-radius:40px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}
button:hover{
    transform:scale(1.05);
    background:#ff2e6f;
}

#contenido{
    display:none;
    margin-top:25px;
}

img{
    width:230px;
    border-radius:20px;
    border:4px solid white;
    box-shadow:0 0 20px rgba(255,255,255,.5);
}

#mensaje{
    margin-top:20px;
    font-size:22px;
    line-height:1.6;
    color:#fff;
}

.corazon{
    position:fixed;
    color:#ff4d6d;
    animation:subir 5s linear forwards;
}

@keyframes subir{
    from{
        transform:translateY(0) scale(1);
        opacity:1;
    }
    to{
        transform:translateY(-110vh) scale(2);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="caja">
    <h1>🌙 Buenas Noches 🌙</h1>

    <p>Hay un pequeño mensaje para ti...</p>

    <button onclick="mostrar()">
        Presióname ❤️
    </button>

    <div id="contenido">

        <!-- Cambia foto.jpg por el nombre de tu imagen -->
        <img src="foto.jpg" alt="Foto">

        <div id="mensaje">
            💖 Que te vaya muy bien en tu trabajo, señorita bonita. <br><br>
            Espero que tengas una linda noche, que todo salga de maravilla y que regreses con bien a casa. Cuídate mucho y nunca pierdas esa hermosa sonrisa que ilumina a quienes te rodean. 🌙✨
        </div>

    </div>
</div>

<script>
// Crear estrellas
for(let i=0;i<120;i++){
    let e=document.createElement("div");
    e.className="estrella";
    e.style.left=Math.random()*100+"vw";
    e.style.top=Math.random()*100+"vh";
    e.style.animationDelay=Math.random()*2+"s";
    document.body.appendChild(e);
}

function mostrar(){

    document.getElementById("contenido").style.display="block";

    setInterval(function(){

        let c=document.createElement("div");

        c.className="corazon";
        c.innerHTML="❤";

        c.style.left=Math.random()*100+"vw";
        c.style.bottom="-20px";
        c.style.fontSize=(20+Math.random()*30)+"px";

        document.body.appendChild(c);

        setTimeout(function(){
            c.remove();
        },5000);

    },180);

}
</script>

</body>
</html>
